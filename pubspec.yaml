name: hr_management_supabase
description: A production-ready HR management starter app built with Flutter and Supabase.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.9.1
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  go_router: ^15.1.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  # Version 6 updates the web scanner (ZXing) and fixes blank previews when
  # reopening the camera.
  mobile_scanner: ^6.0.8
  qr_flutter: ^4.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/twenty_two_studio.jpg
